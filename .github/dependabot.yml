version: 2
updates:
  # GitHub Actions — chore prefix, no release triggered
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"

  # All npm dependencies (root workspace covers backend + frontend) — fix prefix, triggers patch release
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "fix"

  # Python collector dependencies — fix prefix, triggers patch release
  - package-ecosystem: "uv"
    directory: "/collector"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "fix"
