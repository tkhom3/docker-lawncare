services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lawncare-app
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DATA_DIR=/app/data
    volumes:
      - ${LAWNCARE_DATA_PATH:-./data}:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/settings', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  collector:
    build:
      context: .
      dockerfile: Dockerfile.collector
    container_name: lawncare-collector
    env_file:
      - .env
    environment:
      - DATA_DIR=/app/data
    volumes:
      - ${LAWNCARE_DATA_PATH:-./data}:/app/data
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
